[general]
static=yes
writeprotect=no

; ============================================================
; TESTE 1 — só valida que o tronco disca e o áudio chega.
;   Do console: channel originate PJSIP/5579999998888@ifalei application Playback demo-congrats
; ============================================================

[saida-triagem]
; Discagem para celular: 55 + DDD + numero
exten => _55XXXXXXXXXXX,1,NoOp(Ligando para ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@ifalei,60)
 same => n,Hangup()

; ============================================================
; TESTE 2 — entrega o áudio ao agente via ExternalMedia (ARI).
; Só habilite depois que o TESTE 1 funcionar.
; ============================================================

[agente-triagem]
exten => s,1,Answer()
 same => n,Stasis(triagem)     ; entrega o canal para a app ARI
 same => n,Hangup()
