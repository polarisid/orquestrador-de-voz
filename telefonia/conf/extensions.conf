[general]
static=yes
writeprotect=no

; ============================================================
; TESTE — valida o tronco sem envolver a ElevenLabs.
;   channel originate PJSIP/5579XXXXXXXXX@ifalei application Milliwatt
; ============================================================

[saida-triagem]
exten => _55XXXXXXXXXXX,1,NoOp(Teste manual para ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@ifalei,60)
 same => n,Hangup()

; ============================================================
; PONTE — chamadas vindas da ElevenLabs saem pelo tronco iFalei.
; A ElevenLabs manda o destino em E.164 (+5579...). Tiramos o +
; porque a iFalei espera so digitos.
; ============================================================

[da-elevenlabs]
; +55 + DDD + numero
exten => _+55XXXXXXXXXXX,1,NoOp(ElevenLabs -> ${EXTEN})
 same => n,Set(DESTINO=${EXTEN:1})
 same => n,Set(CALLERID(num)=${CALLER_ID_SAIDA})
 same => n,Dial(PJSIP/${DESTINO}@ifalei,60)
 same => n,Hangup()

; sem o + na frente, caso configurem assim
exten => _55XXXXXXXXXXX,1,NoOp(ElevenLabs -> ${EXTEN})
 same => n,Set(CALLERID(num)=${CALLER_ID_SAIDA})
 same => n,Dial(PJSIP/${EXTEN}@ifalei,60)
 same => n,Hangup()

; ============================================================
; TRANSBORDO — ramal humano.
; ============================================================

[atendimento]
exten => _X.,1,Dial(PJSIP/${EXTEN}@ifalei,45)
 same => n,Hangup()
